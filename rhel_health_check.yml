---
- name: RHEL System Health Check
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    server_group: "{{ server_group | default('All Servers') }}"
    check_type: "{{ check_type | default('Full Health Check') }}"
    include_perf: "{{ include_perf | default('Yes') }}"
    servers:
      - { name: "rhel-web01.example.com", group: "Web Servers" }
      - { name: "rhel-web02.example.com", group: "Web Servers" }
      - { name: "rhel-db01.example.com", group: "Database Servers" }
      - { name: "rhel-app01.example.com", group: "App Servers" }

  tasks:
    - name: Filter servers by group
      ansible.builtin.set_fact:
        target_servers: "{{ (server_group == 'All Servers') | ternary(servers, servers | selectattr('group', 'equalto', server_group) | list) }}"
      changed_when: true

    - name: Starting health check
      ansible.builtin.debug:
        msg: "Running {{ check_type }} on {{ server_group }}"
      changed_when: true

    - name: Gathering system facts
      ansible.builtin.debug:
        msg: "{{ item.name }}: RHEL 9.3 | Kernel: 5.14.0-362.13.1.el9_3.x86_64"
      loop: "{{ target_servers }}"
      loop_control:
        pause: 1

    - name: Checking disk space
      ansible.builtin.debug:
        msg: "{{ item.name }} - /dev/sda1: 23% used (23G/100G)"
      loop: "{{ target_servers }}"
      loop_control:
        pause: 1
      when: check_type in ['Full Health Check', 'Disk Only']

    - name: Checking memory usage
      ansible.builtin.debug:
        msg: "{{ item.name }} - Memory: 4.5G/16G used (28%) | Swap: 0/4G"
      loop: "{{ target_servers }}"
      loop_control:
        pause: 1
      when: check_type in ['Full Health Check', 'Memory Only']

    - name: Checking services
      ansible.builtin.debug:
        msg: "{{ item.name }} - ✓ No failed services"
      loop: "{{ target_servers }}"
      loop_control:
        pause: 1
      when: check_type in ['Full Health Check', 'Services Only']

    - name: Gathering performance metrics
      ansible.builtin.debug:
        msg: "{{ item.name }} - Load: 0.12, 0.08, 0.05 | Uptime: 43 days"
      loop: "{{ target_servers }}"
      loop_control:
        pause: 1
      when: include_perf == 'Yes'

    - name: Health check complete
      ansible.builtin.debug:
        msg: "✅ {{ check_type }} complete for {{ target_servers | length }} server(s)"
