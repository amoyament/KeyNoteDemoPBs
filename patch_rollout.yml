---
- name: CVE-2026-3847 Emergency Patch Rollout
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cve_id: "CVE-2026-3847"
    patch_package: "openssl-3.0.7-27.el9_3"
    servers:
      - "web01.example.com"
      - "web02.example.com"
      - "db01.example.com"
      - "db02.example.com"
      - "app01.example.com"
      - "app02.example.com"

  tasks:
    - name: Starting {{ cve_id }} patch rollout
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "CVE: {{ cve_id }}"
          - "Severity: CRITICAL"
          - "Patch: {{ patch_package }}"
          - "Targets: {{ servers | length }} servers"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      changed_when: true

    - name: Pre-patch snapshot
      ansible.builtin.debug:
        msg: "{{ item }}: Creating snapshot... ✓"
      loop: "{{ servers }}"
      loop_control:
        pause: 1

    - name: Checking current package version
      ansible.builtin.debug:
        msg: "{{ item }}: openssl-3.0.7-18.el9_3 (vulnerable)"
      loop: "{{ servers }}"
      loop_control:
        pause: 1

    - name: Applying patch
      ansible.builtin.debug:
        msg: "{{ item }}: Installing {{ patch_package }}..."
      loop: "{{ servers }}"
      loop_control:
        pause: 2
      changed_when: true

    - name: Verifying patch installation
      ansible.builtin.debug:
        msg: "{{ item }}: {{ patch_package }} ✓ Installed"
      loop: "{{ servers }}"
      loop_control:
        pause: 1

    - name: Restarting affected services
      ansible.builtin.debug:
        msg: "{{ item }}: Restarting httpd, sshd... ✓"
      loop: "{{ servers }}"
      loop_control:
        pause: 1
      changed_when: true

    - name: Patch rollout complete
      ansible.builtin.debug:
        msg:
          - "✅ PATCH ROLLOUT COMPLETE"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "CVE: {{ cve_id }}"
          - "Servers patched: {{ servers | length }}"
          - "Package: {{ patch_package }}"
          - "Status: All systems secured"
