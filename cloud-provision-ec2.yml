---
- name: Provision AWS EC2 Instance
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    instance_name: "acme-app-{{ 9999 | random }}"
    instance_type: "t3.medium"
    ami_id: "ami-0c55b159cbfafe1f0"
    region: "us-east-1"
    subnet: "subnet-0a1b2c3d4e5f"
    sg_id: "sg-0abc123def456"

  tasks:
    - name: Validating provisioning request
      ansible.builtin.debug:
        msg:
          - "Instance: {{ instance_name }}"
          - "Type: {{ instance_type }}"
          - "AMI: {{ ami_id }} (RHEL 9.3)"
          - "Region: {{ region }}"
      changed_when: true

    - name: Checking account quotas
      ansible.builtin.debug:
        msg: "EC2 quota check: 14/50 instances in use. Capacity available."

    - name: Requesting EC2 instance
      ansible.builtin.debug:
        msg: "Launching {{ instance_type }} in {{ region }}..."
      changed_when: true

    - name: Waiting for instance initialization
      ansible.builtin.pause:
        seconds: 5

    - name: Instance launched
      ansible.builtin.debug:
        msg:
          - "Instance ID: i-0{{ 99999999999 | random }}"
          - "State: running"
          - "Private IP: 10.{{ 255 | random }}.{{ 255 | random }}.{{ 255 | random }}"
          - "Public IP: 54.{{ 255 | random }}.{{ 255 | random }}.{{ 255 | random }}"
      changed_when: true

    - name: Applying standard tags
      ansible.builtin.debug:
        msg:
          - "Tags applied:"
          - "  Name: {{ instance_name }}"
          - "  Environment: production"
          - "  ManagedBy: ansible-automation"
          - "  CostCenter: IT-OPS-4200"
          - "  PatchGroup: RHEL-Weekly"
      changed_when: true

    - name: Registering with RHEL Satellite
      ansible.builtin.debug:
        msg: "Registered {{ instance_name }} with satellite.example.com"
      changed_when: true

    - name: Configuring CloudWatch monitoring
      ansible.builtin.debug:
        msg: "CloudWatch detailed monitoring enabled. Alarm: CPU > 80% for 5 min"
      changed_when: true

    - name: EC2 provisioning complete
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "  EC2 INSTANCE PROVISIONED"
          - "  Name: {{ instance_name }}"
          - "  Type: {{ instance_type }}"
          - "  OS: RHEL 9.3"
          - "  Status: Running"
          - "  SSH: ssh ec2-user@{{ instance_name }}.example.com"
          - "============================================"
