---
- name: Branch Network Health Check
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    branch_id: "Branch 142"
    checks:
      - { name: "DNS Resolution", status: "✓ Passed" }
      - { name: "DHCP Services", status: "✓ Passed" }
      - { name: "Core Switch Connectivity", status: "✓ Passed" }
      - { name: "WAN Link", status: "✓ Passed" }
      - { name: "Firewall Rules", status: "✓ Passed" }

  tasks:
    - name: Initiating network health check for {{ branch_id }}
      ansible.builtin.debug:
        msg: "Starting diagnostics for {{ branch_id }}..."
      changed_when: true

    - name: Running connectivity tests
      ansible.builtin.debug:
        msg: "{{ item.name }}: {{ item.status }}"
      loop: "{{ checks }}"
      loop_control:
        pause: 2

    - name: Analyzing firewall configuration
      ansible.builtin.pause:
        seconds: 3
        prompt: "Inspecting firewall ruleset..."

    - name: All health checks passed
      ansible.builtin.debug:
        msg: |
          All checks passed for {{ branch_id }}
          DNS Resolution: Passed
          DHCP Services: Passed
          Core Switch Connectivity: Passed
          WAN Link: Passed
          Firewall Rules: Passed
